name: Publish Crate

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish lovely-packager
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag matches crate version
        run: |
          version="$(awk -F '"' '/^[[:space:]]*version[[:space:]]*=/ { print $2; exit }' Cargo.toml)"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Release tag $GITHUB_REF_NAME does not match Cargo.toml version $version."
            exit 1
          fi

      - name: Verify release tag is on main
        run: |
          git fetch origin main
          release_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$release_commit" origin/main

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
